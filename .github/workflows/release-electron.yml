name: Build and Release Electron App

# Second, parallel pipeline to deploy.yml (which keeps publishing the web build to GitHub
# Pages). Triggered by `npm run release`, which bumps the version and pushes a vX.Y.Z tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npm run electron:build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish the draft release
        # electron-builder always creates/updates the GitHub Release as a draft. electron-updater
        # refuses to see draft releases, so flip it to published once both OS builds have
        # uploaded their artifacts.
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
